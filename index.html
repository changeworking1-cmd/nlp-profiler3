<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP Profiler | Change Working</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#f8fafc,#f1f5f9);min-height:100vh}
.container{max-width:48rem;margin:0 auto;padding:2rem}
.card{background:#fff;border-radius:0.5rem;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);padding:2rem}
.btn{padding:0.75rem 1.5rem;border:none;border-radius:0.5rem;font-size:1rem;cursor:pointer;font-weight:600}
.btn-primary{background:#8B2635;color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-secondary{background:#e2e8f0;color:#334155}
.btn-secondary:hover{background:#cbd5e1}
input[type="password"],input[type="text"]{width:100%;padding:0.75rem;border:1px solid #cbd5e1;border-radius:0.5rem;font-size:1rem}
input:focus{outline:none;border-color:#8B2635}
.mb-2{margin-bottom:0.5rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}
.mt-4{margin-top:1rem}
.text-center{text-align:center}
.text-xl{font-size:1.25rem}
.text-2xl{font-size:1.5rem}
.text-3xl{font-size:1.875rem}
.text-burgundy{color:#8B2635}
.text-gray{color:#475569}
.text-sm{font-size:0.875rem}
.error{color:#dc2626;font-size:0.875rem;margin-top:0.5rem}
.flex{display:flex}
.justify-between{justify-content:space-between}
.items-center{align-items:center}
.gap-4{gap:1rem}
.progress-bar{width:100%;height:0.75rem;background:#e2e8f0;border-radius:9999px;overflow:hidden}
.progress-fill{height:100%;background:#8B2635;transition:width 0.3s}
</style>
</head>
<body>
<div id="root">
<div class="container">
<div class="card text-center">
<h1 class="text-burgundy text-2xl mb-4">Loading...</h1>
</div>
</div>
</div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect}=React;

const App=()=>{
const[auth,setAuth]=useState(false);
const[pwd,setPwd]=useState('');
const[err,setErr]=setErr]=useState('');

useEffect(()=>{
if(sessionStorage.getItem('auth')==='1')setAuth(true);
},[]);

const handleLogin=(e)=>{
e.preventDefault();
if(pwd==='ChangeProfiling2025'){
setAuth(true);
sessionStorage.setItem('auth','1');
setErr('');
}else{
setErr('Incorrect password');
setPwd('');
}
};

if(!auth){
return(
<div className="container">
<div className="card">
<div className="text-center mb-6">
<div className="text-3xl text-burgundy mb-2" style={{fontWeight:700}}>CHANGE WORKING</div>
<h1 className="text-2xl mb-2" style={{fontWeight:600}}>NLP Metaprogramme Profiler</h1>
<p className="text-gray">Please enter your access password</p>
</div>
<form onSubmit={handleLogin}>
<div className="mb-4">
<label className="block mb-2 text-sm" style={{fontWeight:500}}>Access Password</label>
<input type="password" value={pwd} onChange={(e)=>setPwd(e.target.value)} placeholder="Enter password" autoFocus/>
{err&&<div className="error">{err}</div>}
</div>
<button type="submit" className="btn btn-primary" style={{width:'100%'}}>Access Profiler</button>
</form>
<div className="mt-4 text-center text-sm text-gray" style={{paddingTop:'1.5rem',borderTop:'1px solid #e2e8f0'}}>
<p className="mb-2">Don't have access?</p>
<a href="mailto:alan@changeworking.co.uk" className="text-burgundy" style={{fontWeight:500}}>Contact us to get your password</a>
</div>
</div>
</div>
);
}

return(
<div className="container">
<div className="card text-center">
<h1 className="text-burgundy text-3xl mb-4">✅ You're In!</h1>
<p className="mb-4">Password protection is working.</p>
<p className="text-sm text-gray">Full profiler will be added here.</p>
<button onClick={()=>{sessionStorage.clear();setAuth(false);}} className="btn btn-secondary mt-4">Logout</button>
</div>
</div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
