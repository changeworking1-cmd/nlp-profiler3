<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP Profiler | Change Working</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#f8fafc,#f1f5f9);min-height:100vh}
.container{max-width:48rem;margin:0 auto;padding:2rem}
.card{background:#fff;border-radius:0.5rem;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);padding:2rem}
.btn{padding:0.75rem 1.5rem;border:none;border-radius:0.5rem;font-size:1rem;cursor:pointer;font-weight:600;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.btn-primary{background:#8B2635;color:#fff}
.btn-secondary{background:#e2e8f0;color:#334155}
.btn-secondary:hover{background:#cbd5e1}
input[type="password"],input[type="text"],input[type="radio"]{font-size:16px}
input[type="password"],input[type="text"]{width:100%;padding:0.75rem;border:1px solid #cbd5e1;border-radius:0.5rem}
input:focus{outline:none;border-color:#8B2635}
input[type="radio"]{min-width:20px;min-height:20px;margin-right:0.5rem;accent-color:#8B2635}
.mb-2{margin-bottom:0.5rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}
.mt-4{margin-top:1rem}
.text-center{text-align:center}
.text-xl{font-size:1.25rem}
.text-2xl{font-size:1.5rem}
.text-3xl{font-size:1.875rem}
.burgundy{color:#8B2635}
.gray{color:#475569}
.text-sm{font-size:0.875rem}
.error{color:#dc2626;font-size:0.875rem;margin-top:0.5rem}
.flex{display:flex}
.justify-between{justify-content:space-between}
.items-center{align-items:center}
.gap-3{gap:0.75rem}
.progress-bar{width:100%;height:0.75rem;background:#e2e8f0;border-radius:9999px;overflow:hidden;margin-bottom:1rem}
.progress-fill{height:100%;background:#8B2635;transition:width 0.3s}
.question-option{display:flex;align-items:center;padding:1rem;border:2px solid #e2e8f0;border-radius:0.5rem;margin-bottom:0.75rem;cursor:pointer;transition:all 0.2s}
.question-option:hover{border-color:#8B2635;background:#f8fafc}
.question-option.selected{border-color:#8B2635;background:#fff5f7}
.result-section{padding:1.5rem;border-left:4px solid;border-radius:0 0.5rem 0.5rem 0;margin-bottom:1.5rem}
.result-section h3{margin-bottom:1rem;font-size:1.25rem}
.result-section p{line-height:1.6;color:#334155}
@media print{button{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect}=React;

const questions=[
{id:'direction',q:"What motivates you more at work?",a:"Achieving goals and gaining rewards",b:"Avoiding problems and risks"},
{id:'reference',q:"When you've done a good job, you know because:",a:"You feel satisfied internally",b:"Others give you positive feedback"},
{id:'scope',q:"When starting a new project, you prefer to:",a:"See the big picture and overall vision",b:"Focus on specific details and steps"},
{id:'sorting',q:"In conversations, you tend to:",a:"Find similarities and common ground",b:"Spot differences and exceptions"},
{id:'time',q:"How do you experience time?",a:"Fluid and in-the-moment",b:"Linear and planned ahead"},
{id:'rep',q:"When learning something new, you prefer to:",a:"See diagrams and visual explanations",b:"Hear explanations and discuss it",c:"Get hands-on and try it yourself"},
{id:'motivation',q:"What drives you most?",a:"Having influence and control",b:"Building relationships and belonging",c:"Achieving results and goals"},
{id:'action',q:"When faced with a challenge, you:",a:"Jump in and take action immediately",b:"Think it through before acting"},
{id:'decision',q:"When solving problems, you prefer:",a:"Multiple options and alternatives",b:"Proven procedures and best practices"},
{id:'response',q:"Under stress, you tend to:",a:"Lead with emotions and feelings",b:"Stay logical and analytical",c:"Flex between both depending on context"},
{id:'rules1',q:"When it comes to standards:",a:"I follow my way, you follow yours",b:"There's one right way for everyone"},
{id:'rules2',q:"About workplace procedures:",a:"Different approaches work for different people",b:"We should all follow the same standards"},
{id:'communication',q:"You prefer communication that is:",a:"Direct and to the point",b:"Detailed with full context"},
{id:'change',q:"When things change, you:",a:"Get excited by new possibilities",b:"Prefer stability and consistency"},
{id:'focus',q:"You work best when:",a:"Working on one thing deeply",b:"Juggling multiple projects"}
];

const App=()=>{
const[auth,setAuth]=useState(false);
const[pwd,setPwd]=useState('');
const[err,setErr]=useState('');
const[currentQ,setCurrentQ]=useState(0);
const[answers,setAnswers]=useState({});
const[name,setName]=useState('');
const[showResults,setShowResults]=useState(false);

useEffect(()=>{
if(sessionStorage.getItem('auth')==='1')setAuth(true);
const saved=localStorage.getItem('profiler-progress');
if(saved){
const data=JSON.parse(saved);
setAnswers(data.answers||{});
setCurrentQ(data.currentQ||0);
setName(data.name||'');
}
},[]);

useEffect(()=>{
if(auth&&!showResults){
localStorage.setItem('profiler-progress',JSON.stringify({answers,currentQ,name}));
}
},[answers,currentQ,name,auth,showResults]);

const handleLogin=(e)=>{
e.preventDefault();
if(pwd==='ChangeProfiling2025'){
setAuth(true);
sessionStorage.setItem('auth','1');
setErr('');
}else{
setErr('Incorrect password');
setPwd('');
}
};

const handleAnswer=(questionId,answer)=>{
setAnswers({...answers,[questionId]:answer});
if(currentQ<questions.length-1){
setTimeout(()=>setCurrentQ(currentQ+1),300);
}else{
setTimeout(()=>{
setShowResults(true);
localStorage.removeItem('profiler-progress');
},300);
}
};

const handleBack=()=>{
if(currentQ>0)setCurrentQ(currentQ-1);
};

const handleReset=()=>{
setAnswers({});
setCurrentQ(0);
setShowResults(false);
setName('');
localStorage.removeItem('profiler-progress');
};

const generateProfile=()=>{
const profile={
direction:answers.direction==='a'?'Towards':'Away From',
reference:answers.reference==='a'?'Internal':'External',
scope:answers.scope==='a'?'Big Picture':'Detail',
sorting:answers.sorting==='a'?'Matcher':'Mismatcher',
time:answers.time==='a'?'In-Time':'Through-Time',
rep:answers.rep==='a'?'Visual':answers.rep==='b'?'Auditory':'Kinaesthetic',
motivation:answers.motivation==='a'?'Power':answers.motivation==='b'?'Affiliation':'Achievement',
action:answers.action==='a'?'Proactive':'Reactive',
decision:answers.decision==='a'?'Options':'Procedures',
response:answers.response==='a'?'Emotional':answers.response==='b'?'Logical':'Choice'
};

const narrative=`${name||'This person'} is ${profile.direction==='Towards'?'naturally drawn to goals and gains':'focused on avoiding problems and risks'}, with ${profile.reference==='Internal'?'strong internal confidence':'a need for external validation'}. They ${profile.scope==='Big Picture'?'see patterns and connections across the landscape':'track details and sequences meticulously'}. In conversations, they ${profile.sorting==='Matcher'?'build bridges and find common ground':'spot differences and question assumptions'}. Time feels ${profile.time==='In-Time'?'fluid and present-focused':'structured and planned'} to them. They're ${profile.rep.toLowerCase()}-oriented, ${profile.action.toLowerCase()}, and driven by ${profile.motivation.toLowerCase()}. When making decisions, they prefer ${profile.decision.toLowerCase()}, and under stress they tend to be ${profile.response.toLowerCase()}.`;

return{profile,narrative};
};

const exportPDF=()=>{
window.print();
};

// Password screen
if(!auth){
return(
<div className="container">
<div className="card">
<div className="text-center mb-6">
<div className="text-3xl burgundy mb-2" style={{fontWeight:700}}>CHANGE WORKING</div>
<h1 className="text-2xl mb-2" style={{fontWeight:600}}>NLP Metaprogramme Profiler</h1>
<p className="gray">Please enter your access password</p>
</div>
<form onSubmit={handleLogin}>
<div className="mb-4">
<label className="mb-2 text-sm" style={{display:'block',fontWeight:500}}>Access Password</label>
<input type="password" value={pwd} onChange={(e)=>setPwd(e.target.value)} placeholder="Enter password" autoFocus/>
{err&&<div className="error">{err}</div>}
</div>
<button type="submit" className="btn btn-primary" style={{width:'100%'}}>Access Profiler</button>
</form>
<div className="mt-4 text-center text-sm gray" style={{paddingTop:'1.5rem',borderTop:'1px solid #e2e8f0'}}>
<p className="mb-2">Don't have access?</p>
<a href="mailto:alan@changeworking.co.uk" className="burgundy" style={{fontWeight:500}}>Contact us</a>
</div>
</div>
</div>
);
}

// Results screen
if(showResults){
const {profile,narrative}=generateProfile();
return(
<div className="container">
<div className="card">
<div className="flex justify-between items-center mb-6" style={{borderBottom:'1px solid #e2e8f0',paddingBottom:'1rem'}}>
<h2 className="text-2xl" style={{fontWeight:700}}>Your Profile{name?`: ${name}`:''}</h2>
<div className="flex gap-3">
<button onClick={exportPDF} className="btn btn-primary">📄 Save PDF</button>
<button onClick={handleReset} className="btn btn-secondary">New Profile</button>
</div>
</div>

<div className="result-section" style={{backgroundColor:'#f9f5f0',borderColor:'#8B2635'}}>
<h3 className="burgundy">Your Story</h3>
<p style={{fontStyle:'italic'}}>{narrative}</p>
</div>

<div className="result-section" style={{backgroundColor:'#f0fdf4',borderColor:'#16a34a'}}>
<h3 style={{color:'#16a34a'}}>Your Patterns</h3>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
{Object.entries(profile).map(([key,val])=>(
<div key={key} style={{background:'#fff',padding:'0.75rem',borderRadius:'0.5rem'}}>
<div className="text-sm gray">{key.charAt(0).toUpperCase()+key.slice(1)}:</div>
<div className="burgundy" style={{fontWeight:600}}>{val}</div>
</div>
))}
</div>
</div>

<div className="result-section" style={{backgroundColor:'#eff6ff',borderColor:'#2563eb'}}>
<h3 style={{color:'#2563eb'}}>Communication Tips</h3>
<p>
{profile.reference==='Internal'?'Trust their judgment, don\'t micromanage.':'Give regular feedback and recognition.'}
{' '}
{profile.scope==='Big Picture'?'Start with the vision before diving into details.':'Provide step-by-step information and specifics.'}
{' '}
{profile.action==='Proactive'?'Give them autonomy to take initiative.':'Give them time to think before expecting action.'}
</p>
</div>

<div style={{marginTop:'2rem',padding:'1.5rem',background:'#f8fafc',borderRadius:'0.5rem',textAlign:'center'}}>
<p className="text-sm gray">Want to go deeper?</p>
<p className="text-sm"><a href="mailto:alan@changeworking.co.uk" className="burgundy" style={{fontWeight:600}}>Book a 1-to-1 debrief session</a></p>
</div>
</div>
</div>
);
}

// Name input screen
if(currentQ===0&&!name){
return(
<div className="container">
<div className="card">
<div className="text-center mb-6">
<div className="text-3xl burgundy mb-2" style={{fontWeight:700}}>CHANGE WORKING</div>
<h1 className="text-2xl mb-4" style={{fontWeight:600}}>NLP Metaprogramme Profiler</h1>
</div>
<div className="mb-4">
<label className="mb-2 text-sm" style={{display:'block',fontWeight:500}}>Your Name (optional)</label>
<input type="text" value={name} onChange={(e)=>setName(e.target.value)} placeholder="Enter your name" autoFocus/>
</div>
<button onClick={()=>setName(name||'Anonymous')} className="btn btn-primary" style={{width:'100%'}}>Start Profiler</button>
</div>
</div>
);
}

// Question screen
const question=questions[currentQ];
const progress=((currentQ+1)/questions.length)*100;

return(
<div className="container">
<div className="card">
<div className="flex justify-between items-center mb-4">
<button onClick={handleReset} className="btn btn-secondary text-sm">← Exit</button>
{currentQ>0&&<button onClick={handleBack} className="btn btn-secondary text-sm">← Back</button>}
</div>

<div className="mb-4">
<div className="flex justify-between mb-2 text-sm gray">
<span>Question {currentQ+1} of {questions.length}</span>
<span>{Math.round(progress)}%</span>
</div>
<div className="progress-bar">
<div className="progress-fill" style={{width:progress+'%'}}/>
</div>
</div>

<h2 className="text-xl mb-6" style={{fontWeight:600}}>{question.q}</h2>

<div>
<label className={`question-option${answers[question.id]==='a'?' selected':''}`} onClick={()=>handleAnswer(question.id,'a')}>
<input type="radio" name={question.id} checked={answers[question.id]==='a'} onChange={()=>{}} />
{question.a}
</label>
<label className={`question-option${answers[question.id]==='b'?' selected':''}`} onClick={()=>handleAnswer(question.id,'b')}>
<input type="radio" name={question.id} checked={answers[question.id]==='b'} onChange={()=>{}} />
{question.b}
</label>
{question.c&&(
<label className={`question-option${answers[question.id]==='c'?' selected':''}`} onClick={()=>handleAnswer(question.id,'c')}>
<input type="radio" name={question.id} checked={answers[question.id]==='c'} onChange={()=>{}} />
{question.c}
</label>
)}
</div>
</div>
</div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
